name: CPU OpenMP

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, ready_for_review]
    branches: ["master"]

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ===== BUILD =====
  build:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'compile-ci') && github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake git \
            libopenmpi-dev openmpi-bin \
            libomp-dev

      - name: Configure CMake
        run: |
          mkdir -p build_openmp
          cd build_openmp
          cmake .. \
            -DBUILD_TYPE=Debug \
            -DPLATFORMS=OPENMP \
            -DOPALX_ENABLE_UNIT_TESTS=ON

      - name: Build
        run: |
          cd build_openmp
          make -j$(nproc)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-openmp-debug
          path: |
            build_openmp/CTestTestfile.cmake
            build_openmp/unit_tests/

  # ===== UNIT TESTS =====
  unit-tests:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Install MPI runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenmpi-dev openmpi-bin

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-openmp-debug
          path: .

      - name: Run unit tests
        run: |
          cd build_openmp
          ctest --output-on-failure -j $(nproc)
