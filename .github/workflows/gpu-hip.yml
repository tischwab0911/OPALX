name: GPU HIP

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, ready_for_review]
    branches: ["master"]

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}-${{ contains(github.event.pull_request.labels.*.name, 'compile-ci') && github.event.pull_request.draft == false && (github.event.action != 'labeled' || github.event.label.name == 'compile-ci') && 'ci' || github.run_id }}
  cancel-in-progress: true

jobs:
  # ===== BUILD =====
  # No unit tests or smoke tests: GPU code cannot be executed on the CI runner.
  build:
    name: Compile
    runs-on: ubuntu-latest
    if: >
      contains(github.event.pull_request.labels.*.name, 'compile-ci') &&
      github.event.pull_request.draft == false &&
      (github.event.action != 'labeled' || github.event.label.name == 'compile-ci')

    container:
      image: rocm/dev-ubuntu-22.04:7.2

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y build-essential git wget p7zip-full unzip locales libopenmpi-dev openmpi-bin
          # Install minimal ROCm packages needed for Kokkos and HeFFTe
          apt-get install -y rocthrust-dev rocprim-dev rocfft-dev
          # Set UTF-8 locale to avoid zip extraction issues
          locale-gen en_US.UTF-8
          update-locale LANG=en_US.UTF-8
          export LANG=en_US.UTF-8
          export LC_ALL=en_US.UTF-8
          # Install CMake 4.1.1
          wget https://cmake.org/files/v4.1/cmake-4.1.1-linux-x86_64.sh
          bash cmake-4.1.1-linux-x86_64.sh --skip-license --prefix=/usr/local
          cmake --version

      - name: Configure CMake
        run: |
          mkdir -p build_hip
          cd build_hip
          cmake .. \
            -DBUILD_TYPE=Debug \
            -DCMAKE_PREFIX_PATH=/opt/rocm \
            -DCMAKE_CXX_COMPILER=hipcc \
            -DPLATFORMS=HIP \
            -DARCH=gfx90a \
            -DAMDGPU_TARGETS=gfx90a \
            -DCMAKE_HIP_ARCHITECTURES=gfx90a \
            -DCMAKE_HIP_FLAGS=--offload-arch=gfx90a \
            -DKokkos_ARCH_AMD_GFX90A=ON \
            -DOPALX_ENABLE_UNIT_TESTS=ON

      - name: Build
        run: |
          cd build_hip
          make -j$(nproc)
