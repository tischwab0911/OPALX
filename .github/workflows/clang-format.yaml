name: clang-format

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, ready_for_review]
    branches: ["master"]

jobs:
  clang-format:
    runs-on: ubuntu-latest
    container:
      image: debian:testing
    if: |
      github.event_name == 'merge_group' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'compile-ci') &&
       github.event.pull_request.draft == false)

    steps:
      - name: Install prerequisites
        run: |
          apt-get update
          apt-get install -y git python3 python3-pip

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # IMPORTANT: required for git diff

      - name: Install clang-format 20.1.8
        run: |
          pip install "clang-format==20.1.8"
          clang-format --version

      - name: Get list of modified source files
        id: files
        env:
          BASE_REF: ${{ github.base_ref || github.event.merge_group.base_ref }}
        run: |
          BASE_REF="${BASE_REF#refs/heads/}"
          git fetch origin "$BASE_REF"

          FILES="$(
            git diff --name-only -z "origin/${BASE_REF}...HEAD" \
              | tr '\0' '\n' \
              | grep -E '^(src|unit_tests)/.*\.(h|hpp|tpp|cpp)$' || true
          )"

          echo "$FILES"
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Run clang-format check
        if: steps.files.outputs.files != ''
        run: |
          echo "Checking files:"
          echo "${{ steps.files.outputs.files }}"

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            clang-format --dry-run --Werror \
              -style="file:${{ github.workspace }}/.clang-format" \
              "$file"
          done <<'EOF'
          ${{ steps.files.outputs.files }}
          EOF

