name: CI workflow
          
on:
  ## Trigger CI workflow on push to any branch (commented out to limit runs)
  push:
  ## Trigger CI workflow on pull requests to the master branch   
  pull_request:
    branches: [ "master" ]
          
jobs:     
  # ===== CPU SERIAL BUILD =====
  build-cpu:  
    runs-on: ubuntu-latest
          
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
          
      - name: Install build tools and linter
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake git lcov \
            libopenmpi-dev openmpi-bin gcovr

      - name: Run gen_OPALrevision
        run: |
          chmod +x ./gen_OPALrevision
          ./gen_OPALrevision
          
      - name: Configure CMake project
        run: |
          mkdir -p build_serial
          cd build_serial
          cmake .. \
            -DCMAKE_BUILD_TYPE=Debug \
            -DOPALX_ENABLE_UNIT_TESTS=ON \
            -DCMAKE_CXX_STANDARD=20 \
            -DIPPL_ENABLE_FFT=ON \
            -DIPPL_ENABLE_SOLVERS=ON \
            -DIPPL_ENABLE_ALPINE=OFF \
            -DIPPL_ENABLE_TESTS=OFF \
            -DIPPL_PLATFORMS=serial \
            -DCMAKE_CXX_FLAGS="--coverage -O0" \
            -DCMAKE_C_FLAGS="--coverage -O0"
          
      - name: Build project
        run: |
          cd build_serial
          make -j$(nproc)
      
      - name: Run all unit tests
        run: |
          cd build_serial
          ctest --output-on-failure -j $(nproc)
  
      - name: List .gcda files
        run: |
          find build_serial -name "*.gcda"

      - name: List .gcno files
        run: |
          find build_serial -name "*.gcno"

      - name: Print workspace
        run: |
          echo "Workspace: ${{ github.workspace }}"

      - name: Generate coverage report
        run: |
          mkdir cov_tmp
          cd cov_tmp
          gcovr \
            -r ${{ github.workspace }} \
            --object-directory ${{ github.workspace }}/build_serial \
            --filter ${{ github.workspace }}/src \
            --xml-pretty ../coverage.xml \
            --html-details ../coverage.html \
            --exclude '.*_deps.*' \
            --exclude '.*3p.*' \
            --exclude '.*unit_tests.*' \
            --gcov-ignore-errors=all \
            --verbose
      
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.html
            coverage.xml

